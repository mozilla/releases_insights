worker_processes auto;
error_log stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 1. DEFINE CACHE PATH
    # We use /tmp/nginx_cache to ensure non-privileged write access
    fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=TWIG_CACHE:10m max_size=100m inactive=60m use_temp_path=off;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";

    log_format main_timed '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          '$request_time $upstream_response_time $pipe $upstream_cache_status';

    access_log /dev/stdout main_timed;
    error_log /dev/stderr notice;

    keepalive_timeout 65;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp_path;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server {
        listen [::]:8000 default_server;
        listen 8000 default_server;
        server_name _;

        sendfile off;
        root /app/public;
        index index.php;

        location / {
            try_files $uri $uri/ /index.php?q=$uri&$args;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/lib/nginx/html;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass unix:/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_index index.php;
            include fastcgi_params;

            # 2. ACTIVATE CACHE FOR PHP
            fastcgi_cache TWIG_CACHE;
            fastcgi_cache_valid 200 1m; # Cache successful renders for 1 minute

            # 3. STALE-WHILE-REVALIDATE (Prevents the 395ms hiccup)
            # Serves stale content if PHP is busy or updating the cache in background
            fastcgi_cache_use_stale error timeout updating http_500 http_503;
            fastcgi_cache_background_update on;
            fastcgi_cache_lock on;

            # 4. MONITORING
            # This allows you to see "HIT", "MISS", or "STALE" in your browser headers
            add_header X-FastCGI-Cache $upstream_cache_status;
        }

        location ~* \.(jpg|jpeg|gif|png|svg|webp|css|js|ico|xml|woff2|html)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        location ~ /\. {
            log_not_found off;
            deny all;
        }

        location ~ ^/(fpm-status|fpm-ping)$ {
            access_log off;
            allow 127.0.0.1;
            deny all;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_pass unix:/run/php-fpm.sock;

            # Ensure we don't cache health checks
            fastcgi_cache_bypass 1;
            fastcgi_no_cache 1;
        }

        rewrite ^/__version__$ /version.json;
        rewrite ^/__heartbeat__$ /heartbeat.php;
        rewrite ^/__lbheartbeat__$ /heartbeat.php;
    }

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_http_version 1.0;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}